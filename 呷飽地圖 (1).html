<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呷飽地圖</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Long+Cang&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F3ECDD;
    --paper-deep: #E9DFC8;
    --card: #FFFBF2;
    --ink: #362E25;
    --ink-soft: #6B6152;
    --stamp: #C1442D;
    --stamp-dark: #9C3620;
    --matcha: #5C7A52;
    --gold: #D9A441;
    --line: #D8CBB0;
    --shadow: 0 2px 8px rgba(54,46,37,0.12);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Noto Sans TC', sans-serif;
    background:var(--paper);
    color:var(--ink);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(54,46,37,0.045) 1px, transparent 0);
    background-size: 16px 16px;
  }
  h1,h2,h3{font-family:'Noto Serif TC', serif; margin:0;}
  button{font-family:inherit; cursor:pointer;}
  input,textarea,select{font-family:inherit;}

  /* ---------- stamp badge ---------- */
  .stamp-badge{
    display:inline-flex; align-items:center; justify-content:center;
    font-family:'Long Cang', cursive;
    color:#fff; background:var(--stamp);
    border:2px solid rgba(255,255,255,0.6);
    border-radius:50%;
    transform:rotate(-8deg);
    box-shadow: 0 2px 6px rgba(193,68,45,0.4);
  }

  /* ---------- onboarding ---------- */
  #screen-onboarding{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .onboard-card{
    background:var(--card); border-radius:18px; box-shadow:var(--shadow);
    padding:40px 36px; max-width:440px; width:100%;
    border:1px solid var(--line);
    position:relative;
  }
  .onboard-card::before{
    content:"";
    position:absolute; top:-10px; left:32px;
    width:36px; height:20px; background:rgba(193,68,45,0.35);
    border-radius:2px; transform:rotate(-4deg);
  }
  .brand{display:flex; align-items:center; gap:12px; margin-bottom:6px;}
  .brand .stamp-badge{width:48px; height:48px; font-size:20px; flex-shrink:0;}
  .brand h1{font-size:26px; font-weight:900; letter-spacing:1px;}
  .tagline{color:var(--ink-soft); font-size:13px; margin:0 0 28px; letter-spacing:1px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:13px; color:var(--ink-soft); margin-bottom:6px;}
  .field input{
    width:100%; padding:11px 13px; border-radius:10px;
    border:1.5px solid var(--line); background:#fffef9; font-size:15px; color:var(--ink);
  }
  .field input:focus{outline:none; border-color:var(--stamp);}
  .btn{
    border:none; border-radius:10px; padding:12px 18px; font-size:15px; font-weight:700;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--stamp); color:#fff; box-shadow:0 3px 0 var(--stamp-dark);}
  .btn-primary:hover{filter:brightness(1.05);}
  .btn-outline{background:transparent; border:1.5px solid var(--ink); color:var(--ink);}
  .btn-outline:hover{background:rgba(54,46,37,0.06);}
  .btn-ghost{background:transparent; color:var(--ink-soft); text-decoration:underline;}
  .btn-block{width:100%;}
  .row-gap{display:flex; gap:10px;}
  .divider-word{
    display:flex; align-items:center; gap:10px; color:var(--ink-soft); font-size:12px; margin:22px 0;
  }
  .divider-word::before, .divider-word::after{content:""; flex:1; height:1px; background:var(--line);}
  .recent-groups{margin-top:18px;}
  .recent-groups .g-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 12px; border:1px dashed var(--line); border-radius:10px; margin-bottom:8px;
    font-size:14px; cursor:pointer; background:#fffef9;
  }
  .recent-groups .g-item:hover{border-color:var(--stamp);}
  .err-msg{color:var(--stamp-dark); font-size:13px; margin-top:6px; display:none;}

  /* ---------- app shell ---------- */
  #screen-app{display:none; height:100vh; flex-direction:column;}
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px; background:var(--card); border-bottom:2px solid var(--line);
    z-index:500; position:relative; flex-shrink:0;
  }
  .topbar-left{display:flex; align-items:center; gap:10px;}
  .topbar-left .stamp-badge{width:34px; height:34px; font-size:15px;}
  .topbar-left h1{font-size:17px;}
  .group-chip{
    font-size:11.5px; color:var(--ink-soft); background:var(--paper-deep);
    padding:3px 9px; border-radius:20px; letter-spacing:0.5px;
  }
  .topbar-right{display:flex; align-items:center; gap:8px;}
  .icon-btn{
    background:transparent; border:1.5px solid var(--line); border-radius:8px;
    padding:7px 11px; font-size:13px; color:var(--ink);
  }
  .icon-btn:hover{border-color:var(--stamp); color:var(--stamp);}

  .app-body{flex:1; display:flex; min-height:0; position:relative;}
  .sidebar{
    width:340px; flex-shrink:0; background:var(--paper);
    border-right:2px solid var(--line); display:flex; flex-direction:column; min-height:0;
  }
  .sidebar-top{padding:14px; border-bottom:1px solid var(--line); flex-shrink:0;}
  .search-box{position:relative;}
  .search-box input{
    width:100%; padding:10px 12px; border-radius:10px; border:1.5px solid var(--line);
    font-size:14px; background:#fffef9;
  }
  .search-results{
    margin-top:8px; max-height:220px; overflow-y:auto;
    border-radius:10px; background:#fffef9; border:1px solid var(--line);
  }
  .search-results.hidden{display:none;}
  .sr-item{padding:9px 12px; font-size:13.5px; border-bottom:1px solid var(--line); cursor:pointer;}
  .sr-item:last-child{border-bottom:none;}
  .sr-item:hover{background:var(--paper-deep);}
  .sr-item .sr-name{font-weight:700;}
  .sr-item .sr-addr{color:var(--ink-soft); font-size:12px;}
  .sidebar-actions{display:flex; gap:8px; margin-top:10px;}

  .place-list{flex:1; overflow-y:auto; padding:12px;}
  .place-card{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:10px; box-shadow:var(--shadow); cursor:pointer;
    position:relative; transition:transform .1s ease;
  }
  .place-card:hover{transform:translateY(-2px);}
  .place-card.active{border-color:var(--stamp); box-shadow:0 0 0 2px rgba(193,68,45,0.25);}
  .pc-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .pc-name{font-weight:700; font-size:14.5px;}
  .pc-addr{color:var(--ink-soft); font-size:12px; margin-top:2px;}
  .pc-stars{font-size:12.5px; color:var(--gold); white-space:nowrap; margin-top:2px;}
  .pc-tags{display:flex; flex-wrap:wrap; gap:5px; margin-top:8px;}
  .tag-chip{
    font-size:10.5px; background:rgba(92,122,82,0.14); color:var(--matcha);
    padding:2px 8px; border-radius:20px; font-weight:700;
  }
  .empty-hint{color:var(--ink-soft); font-size:13px; text-align:center; padding:30px 10px;}

  #map{flex:1; min-height:0;}

  /* ---------- drawer ---------- */
  .drawer-overlay{
    position:fixed; inset:0; background:rgba(54,46,37,0.35); z-index:900; display:none;
  }
  .drawer-overlay.show{display:block;}
  .drawer{
    position:fixed; top:0; right:-460px; width:440px; max-width:92vw; height:100vh;
    background:var(--paper); z-index:950; box-shadow:-4px 0 20px rgba(0,0,0,0.2);
    transition:right .25s ease; display:flex; flex-direction:column;
  }
  .drawer.open{right:0;}
  .drawer-head{
    padding:18px 20px 14px; border-bottom:2px solid var(--line); background:var(--card); flex-shrink:0;
  }
  .drawer-head .close-x{
    float:right; background:transparent; border:none; font-size:20px; color:var(--ink-soft);
  }
  .drawer-head h2{font-size:19px;}
  .drawer-head .d-addr{color:var(--ink-soft); font-size:13px; margin-top:4px;}
  .avg-row{display:flex; align-items:center; gap:8px; margin-top:10px;}
  .avg-row .stamp-badge{width:44px; height:44px; font-size:16px;}
  .avg-count{font-size:12px; color:var(--ink-soft);}
  .drawer-body{flex:1; overflow-y:auto; padding:16px 20px;}
  .section-label{
    font-size:12px; letter-spacing:1.5px; color:var(--ink-soft); text-transform:uppercase;
    margin:18px 0 10px; font-weight:700;
  }
  .section-label:first-child{margin-top:0;}
  .review-note{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:11px 13px; margin-bottom:10px; position:relative;
  }
  .review-note .rn-top{display:flex; justify-content:space-between; align-items:center;}
  .rn-user{font-weight:700; font-size:13.5px;}
  .rn-stars{color:var(--gold); font-size:13px;}
  .rn-date{font-size:10.5px; color:var(--ink-soft);}
  .rn-text{font-size:13.5px; margin-top:6px; line-height:1.5;}
  .rn-tags{display:flex; flex-wrap:wrap; gap:5px; margin-top:8px;}
  .rn-photo{margin-top:8px; max-width:100%; border-radius:8px; display:block;}

  .star-input{display:flex; gap:4px; font-size:26px; user-select:none;}
  .star-input span{cursor:pointer; color:var(--line);}
  .star-input span.on{color:var(--gold);}

  .chip-picker{display:flex; flex-wrap:wrap; gap:7px; margin-top:6px;}
  .chip-opt{
    font-size:12px; padding:5px 11px; border-radius:20px; border:1.5px solid var(--line);
    background:#fffef9; color:var(--ink-soft);
  }
  .chip-opt.on{background:var(--matcha); border-color:var(--matcha); color:#fff;}

  textarea.field-textarea{
    width:100%; border-radius:10px; border:1.5px solid var(--line); padding:10px 12px;
    font-size:13.5px; resize:vertical; min-height:64px; background:#fffef9;
  }
  textarea.field-textarea:focus, .field input:focus{outline:none; border-color:var(--stamp);}

  .private-note{
    background:rgba(217,164,65,0.14); border:1px dashed var(--gold); border-radius:10px;
    padding:11px 13px; margin-top:6px;
  }
  .private-note .pn-label{font-size:11.5px; color:#8a6a1f; font-weight:700; margin-bottom:6px; display:flex; gap:5px; align-items:center;}

  .file-btn{
    display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-soft);
    border:1.5px dashed var(--line); border-radius:8px; padding:7px 10px; cursor:pointer;
  }
  .drawer-foot{padding:14px 20px; border-top:2px solid var(--line); background:var(--card); flex-shrink:0;}

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(12px);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:30px; font-size:13px;
    box-shadow:var(--shadow); z-index:1200; opacity:0; transition:all .25s ease; pointer-events:none;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .leaflet-popup-content{font-family:'Noto Sans TC',sans-serif; font-size:13px;}

  @media (max-width: 760px){
    .sidebar{position:absolute; z-index:400; height:100%; box-shadow:4px 0 16px rgba(0,0,0,0.15); transition: transform 0.3s ease;}
    .sidebar.hide-mobile{transform:translateX(-100%);}
    #map{width:100%;}
    .drawer{width:100vw; max-width:100vw; right:-100vw;}
    .drawer.open{right:0;}
  }
</style>
</head>
<body>

<!-- ============ ONBOARDING ============ -->
<div id="screen-onboarding">
  <div class="onboard-card">
    <div class="brand">
      <div class="stamp-badge">飽</div>
      <h1>呷飽地圖</h1>
    </div>
    <p class="tagline">屬於你和朋友的美食評價地圖</p>

    <div class="field">
      <label>你的暱稱(其他人會看到這個名字)</label>
      <input type="text" id="nickname-input" placeholder="例如:阿明">
    </div>

    <div id="recent-groups-wrap" class="recent-groups" style="display:none;">
      <label style="font-size:13px; color:var(--ink-soft);">最近的群組</label>
      <div id="recent-groups-list"></div>
    </div>

    <div class="divider-word">建立或加入</div>

    <div class="field">
      <label>群組名稱(建立新群組用)</label>
      <input type="text" id="new-group-name" placeholder="例如:大學死黨美食團">
    </div>
    <button class="btn btn-primary btn-block" id="create-group-btn">建立新群組</button>

    <div class="divider-word">或</div>

    <div class="field">
      <label>輸入群組代碼(加入朋友的群組)</label>
      <input type="text" id="join-code-input" placeholder="例如:A3K9QZ" style="text-transform:uppercase;">
    </div>
    <button class="btn btn-outline btn-block" id="join-group-btn">加入群組</button>
    <div class="err-msg" id="onboard-err"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="screen-app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="stamp-badge">飽</div>
      <h1 id="app-group-name">群組名稱</h1>
      <span class="group-chip" id="app-group-code">代碼:------</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="refresh-btn">🔄 重新整理</button>
      <button class="icon-btn" id="copy-code-btn">📋 複製代碼</button>
      <button class="icon-btn" id="leave-group-btn">切換群組</button>
    </div>
  </div>

  <div class="app-body">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="search-box">
          <input type="text" id="place-search-input" placeholder="搜尋店家名稱或地址...">
          <div class="search-results hidden" id="search-results"></div>
        </div>
        <div class="sidebar-actions">
          <button class="btn btn-outline" style="flex:1; font-size:13px; padding:9px;" id="manual-add-btn">✏️ 手動新增店家</button>
        </div>
      </div>
      <div class="place-list" id="place-list">
        <div class="empty-hint">還沒有店家,搜尋或手動新增第一間吧!</div>
      </div>
    </div>
    <div id="map"></div>
  </div>
</div>

<!-- ============ MANUAL ADD MODAL ============ -->
<div class="drawer-overlay" id="manual-overlay"></div>
<div class="drawer" id="manual-drawer">
  <div class="drawer-head">
    <button class="close-x" id="manual-close">✕</button>
    <h2>手動新增店家</h2>
    <div class="d-addr">輸入名稱與地址,系統會嘗試自動定位</div>
  </div>
  <div class="drawer-body">
    <div class="field">
      <label>店家名稱</label>
      <input type="text" id="manual-name" placeholder="例如:巷口牛肉麵">
    </div>
    <div class="field">
      <label>地址(選填,填寫可自動標示在地圖上)</label>
      <input type="text" id="manual-address" placeholder="例如:台北市中山區XX路XX號">
    </div>
    <div class="field">
      <label>或直接在地圖上點選位置</label>
      <button class="btn btn-outline btn-block" id="manual-pick-map-btn">📍 點選地圖上的位置</button>
      <div id="manual-pick-status" style="font-size:12px; color:var(--ink-soft); margin-top:6px;"></div>
    </div>
  </div>
  <div class="drawer-foot">
    <button class="btn btn-primary btn-block" id="manual-save-btn">加入店家</button>
  </div>
</div>

<!-- ============ PLACE DETAIL DRAWER ============ -->
<div class="drawer-overlay" id="detail-overlay"></div>
<div class="drawer" id="detail-drawer">
  <div class="drawer-head">
    <button class="close-x" id="detail-close">✕</button>
    <h2 id="detail-name">店家名稱</h2>
    <div class="d-addr" id="detail-addr">地址</div>
    <div class="avg-row">
      <div class="stamp-badge" id="detail-avg-badge">-</div>
      <div class="avg-count" id="detail-avg-count">尚無評價</div>
    </div>
  </div>
  <div class="drawer-body">
    <div class="section-label">朋友們的評價</div>
    <div id="reviews-list"></div>

    <div class="section-label">我的評價(會分享給群組)</div>
    <div class="field">
      <label>星等</label>
      <div class="star-input" id="my-star-input">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
    </div>
    <div class="field">
      <label>評語</label>
      <textarea class="field-textarea" id="my-review-text" placeholder="這間店吃起來如何?"></textarea>
    </div>
    <div class="field">
      <label>標籤</label>
      <div class="chip-picker" id="tag-picker"></div>
    </div>
    <div class="field">
      <label>照片(選填)</label>
      <label class="file-btn">📷 選擇照片<input type="file" id="my-photo-input" accept="image/*" style="display:none;"></label>
      <img id="my-photo-preview" style="display:none; max-width:140px; border-radius:8px; margin-top:8px;">
    </div>

    <div class="private-note">
      <div class="pn-label">🔒 我的私人備註(只有你看 tender, 不會分享)</div>
      <textarea class="field-textarea" id="my-private-note" placeholder="例如:記得點小辣、要提前訂位..."></textarea>
    </div>
  </div>
  <div class="drawer-foot">
    <button class="btn btn-primary btn-block" id="save-review-btn">儲存我的評價與備註</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(function(){

const TAGS = ['必吃招招牌','環境佳','有停車位','CP值高','適合約會','適合聚餐','外帶方便','服務好'];

let state = {
  nickname: '',
  groupCode: null,
  groupName: '',
  places: [],       
  reviews: {},       
  activePlaceId: null,
  map: null,
  markers: {},       
  manualPickMode: false,
  manualPickedLatLng: null,
  refreshTimer: null
};

// ---------- 改用所有瀏覽器都支援的標準 localStorage ----------
async function sGet(key) {
  try {
    const val = localStorage.getItem(key);
    return val ? { value: val } : null;
  } catch(e) { return null; }
}
async function sSet(key, value) {
  try {
    localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
    return true;
  } catch(e) { console.error('storage set failed', e); return false; }
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function genCode(){
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let c = '';
  for(let i=0;i<6;i++) c += chars[Math.floor(Math.random()*chars.length)];
  return c;
}
function genId(){
  return 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// ---------- onboarding ----------
async function initOnboarding(){
  const res = await sGet('me:profile');
  const profile = res ? JSON.parse(res.value) : null;
  if(profile){
    if(profile.nickname) document.getElementById('nickname-input').value = profile.nickname;
    if(profile.groups && profile.groups.length){
      const wrap = document.getElementById('recent-groups-wrap');
      const list = document.getElementById('recent-groups-list');
      list.innerHTML = '';
      profile.groups.slice(-5).reverse().forEach(g=>{
        const div = document.createElement('div');
        div.className = 'g-item';
        div.innerHTML = `<span>${escapeHtml(g.name)}</span><span style="color:var(--ink-soft); font-size:12px;">${g.code} →</span>`;
        div.onclick = ()=>{
          document.getElementById('join-code-input').value = g.code;
          enterGroup(g.code);
        };
        list.appendChild(div);
      });
      wrap.style.display = 'block';
    }
  }

  document.getElementById('create-group-btn').onclick = async ()=>{
    const nick = document.getElementById('nickname-input').value.trim();
    const gname = document.getElementById('new-group-name').value.trim();
    if(!nick){ showOnboardErr('請先輸入你的暱稱'); return; }
    if(!gname){ showOnboardErr('請輸入群組名稱'); return; }
    state.nickname = nick;
    const code = genCode();
    await sSet(`group:${code}:meta`, JSON.stringify({code, name: gname, createdAt: Date.now(), createdBy: nick}));
    await sSet(`group:${code}:places`, JSON.stringify([]));
    await sSet(`group:${code}:reviews`, JSON.stringify({}));
    await saveProfile(nick, code, gname);
    enterGroup(code);
  };

  document.getElementById('join-group-btn').onclick = async ()=>{
    const nick = document.getElementById('nickname-input').value.trim();
    const code = document.getElementById('join-code-input').value.trim().toUpperCase();
    if(!nick){ showOnboardErr('請先輸入你的暱稱'); return; }
    if(!code){ showOnboardErr('請輸入群組代碼'); return; }
    state.nickname = nick;
    const metaRes = await sGet(`group:${code}:meta`);
    const meta = metaRes ? JSON.parse(metaRes.value) : null;
    if(!meta){ showOnboardErr('找不到這個群組代碼,請確認是否輸入正確'); return; }
    await saveProfile(nick, code, meta.name);
    enterGroup(code);
  };
}
function showOnboardErr(msg){
  const el = document.getElementById('onboard-err');
  el.textContent = msg;
  el.style.display = 'block';
}
async function saveProfile(nick, code, name){
  const res = await sGet('me:profile');
  let profile = res ? JSON.parse(res.value) : null;
  if(!profile) profile = {nickname:nick, groups:[]};
  profile.nickname = nick;
  profile.groups = (profile.groups||[]).filter(g=>g.code!==code);
  profile.groups.push({code, name});
  await sSet('me:profile', JSON.stringify(profile));
}

async function enterGroup(code){
  const metaRes = await sGet(`group:${code}:meta`);
  const meta = metaRes ? JSON.parse(metaRes.value) : null;
  if(!meta){ showOnboardErr('找不到這個群組代碼'); return; }
  state.groupCode = code;
  state.groupName = meta.name;
  document.getElementById('screen-onboarding').style.display = 'none';
  document.getElementById('screen-app').style.display = 'flex';
  document.getElementById('app-group-name').textContent = meta.name;
  document.getElementById('app-group-code').textContent = '代碼:' + code;
  initMap();
  await loadGroupData();
  buildTagPicker();
  state.refreshTimer = setInterval(loadGroupData, 20000);
}

function buildTagPicker(){
  const picker = document.getElementById('tag-picker');
  picker.innerHTML = '';
  TAGS.forEach(tag=>{
    const chip = document.createElement('span');
    chip.className = 'chip-opt';
    chip.textContent = tag;
    chip.dataset.tag = tag;
    chip.onclick = ()=> chip.classList.toggle('on');
    picker.appendChild(chip);
  });
}

// ---------- map ----------
function initMap(){
  if(state.map) return;
  state.map = L.map('map').setView([25.0478, 121.5319], 13); 
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(state.map);

  state.map.on('click', (e)=>{
    if(state.manualPickMode){
      state.manualPickedLatLng = e.latlng;
      document.getElementById('manual-pick-status').textContent =
        `已選擇位置:${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
      state.manualPickMode = false;
    }
  });
}

function starIcon(avg){
  const color = avg>=4 ? '#5C7A52' : avg>=2.5 ? '#D9A441' : '#C1442D';
  return L.divIcon({
    className: '',
    html: `<div style="background:${color};color:#fff;width:30px;height:30px;border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 6px rgba(0,0,0,0.3); border:2px solid #fff;">
      <span style="transform:rotate(45deg); font-size:12px; font-weight:700;">${avg>0?avg.toFixed(1):'-'}</span>
      </div>`,
    iconSize:[30,30], iconAnchor:[15,30]
  });
}

function refreshMarkers(){
  Object.values(state.markers).forEach(m=>state.map.removeLayer(m));
  state.markers = {};
  const bounds = [];
  state.places.forEach(p=>{
    if(typeof p.lat !== 'number' || typeof p.lng !== 'number') return;
    const revs = state.reviews[p.id] || [];
    const avg = revs.length ? revs.reduce((s,r)=>s+r.stars,0)/revs.length : 0;
    const marker = L.marker([p.lat, p.lng], {icon: starIcon(avg)}).addTo(state.map);
    marker.bindTooltip(p.name);
    marker.on('click', ()=> openDetail(p.id));
    state.markers[p.id] = marker;
    bounds.push([p.lat, p.lng]);
  });
  if(bounds.length && state.map){
    try{ state.map.fitBounds(bounds, {padding:[40,40], maxZoom:16}); }catch(e){}
  }
}

// ---------- data load / render ----------
async function loadGroupData(){
  const pRes = await sGet(`group:${state.groupCode}:places`);
  const rRes = await sGet(`group:${state.groupCode}:reviews`);
  state.places = pRes ? JSON.parse(pRes.value) : [];
  state.reviews = rRes ? JSON.parse(rRes.value) : {};
  renderPlaceList();
  refreshMarkers();
  if(state.activePlaceId) renderDetail(state.activePlaceId);
}

function renderPlaceList(){
  const list = document.getElementById('place-list');
  if(!state.places.length){
    list.innerHTML = '<div class="empty-hint">還沒有店家,搜尋或手動新增第一間吧!</div>';
    return;
  }
  list.innerHTML = '';
  state.places.forEach(p=>{
    const revs = state.reviews[p.id] || [];
    const avg = revs.length ? (revs.reduce((s,r)=>s+r.stars,0)/revs.length) : 0;
    const tagCounts = {};
    revs.forEach(r=> (r.tags||[]).forEach(t=> tagCounts[t]=(tagCounts[t]||0)+1));
    const topTags = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(t=>t[0]);

    const card = document.createElement('div');
    card.className = 'place-card' + (state.activePlaceId===p.id ? ' active':'');
    card.innerHTML = `
      <div class="pc-top">
        <div>
          <div class="pc-name">${escapeHtml(p.name)}</div>
          <div class="pc-addr">${escapeHtml(p.address||'')}</div>
        </div>
        <div class="pc-stars">${avg? '★'.repeat(Math.round(avg)) + ' ' + avg.toFixed(1) : '尚無評價'}</div>
      </div>
      ${topTags.length ? `<div class="pc-tags">${topTags.map(t=>`<span class="tag-chip">${t}</span>`).join('')}</div>` : ''}
    `;
    card.onclick = ()=> openDetail(p.id);
    list.appendChild(card);
  });
}

async function openDetail(placeId){
  state.activePlaceId = placeId;
  renderPlaceList();
  const p = state.places.find(x=>x.id===placeId);
  if(!p) return;
  if(state.markers[placeId] && state.map) state.map.panTo(state.markers[placeId].getLatLng());
  await renderDetail(placeId);
  document.getElementById('detail-overlay').classList.add('show');
  document.getElementById('detail-drawer').classList.add('open');
}

async function renderDetail(placeId){
  const p = state.places.find(x=>x.id===placeId);
  if(!p) return;
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-addr').textContent = p.address || '(無地址資訊)';
  const revs = state.reviews[placeId] || [];
  const avg = revs.length ? revs.reduce((s,r)=>s+r.stars,0)/revs.length : 0;
  document.getElementById('detail-avg-badge').textContent = avg? avg.toFixed(1) : '-';
  document.getElementById('detail-avg-count').textContent = revs.length ? `共 ${revs.length} 則評價` : '尚無評價,當第一個評分的人吧!';

  const revsList = document.getElementById('reviews-list');
  revsList.innerHTML = '';
  if(!revs.length){
    revsList.innerHTML = '<div class="empty-hint" style="padding:14px 0;">還沒有人評價這間店</div>';
  }else{
    revs.slice().sort((a,b)=>b.date-a.date).forEach(r=>{
      const div = document.createElement('div');
      div.className = 'review-note';
      div.innerHTML = `
        <div class="rn-top">
          <span class="rn-user">${escapeHtml(r.user)}</span>
          <span class="rn-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span>
        </div>
        <div class="rn-date">${r.dateStr||''}</div>
        ${r.text ? `<div class="rn-text">${escapeHtml(r.text)}</div>` : ''}
        ${(r.tags&&r.tags.length) ? `<div class="rn-tags">${r.tags.map(t=>`<span class="tag-chip">${t}</span>`).join('')}</div>` : ''}
        ${r.photo ? `<img class="rn-photo" src="${r.photo}">` : ''}
      `;
      revsList.appendChild(div);
    });
  }

  // pre-fill my own review
  const mine = revs.find(r=>r.user===state.nickname);
  setStarInput(mine ? mine.stars : 0);
  document.getElementById('my-review-text').value = mine ? (mine.text||'') : '';
  document.querySelectorAll('#tag-picker .chip-opt').forEach(chip=>{
    chip.classList.toggle('on', !!(mine && mine.tags && mine.tags.includes(chip.dataset.tag)));
  });
  const photoPrev = document.getElementById('my-photo-preview');
  if(mine && mine.photo){ photoPrev.src = mine.photo; photoPrev.style.display='block'; }
  else { photoPrev.style.display='none'; photoPrev.removeAttribute('src'); }
  window._pendingPhoto = mine ? (mine.photo||null) : null;

  // private note
  const nRes = await sGet(`me:note:${state.groupCode}:${placeId}`);
  const note = nRes ? JSON.parse(nRes.value) : null;
  document.getElementById('my-private-note').value = note ? note.text : '';
}

function setStarInput(v){
  document.querySelectorAll('#my-star-input span').forEach(s=>{
    s.classList.toggle('on', parseInt(s.dataset.v) <= v);
  });
  document.getElementById('my-star-input').dataset.value = v;
}

// ---------- geocode search ----------
let searchDebounce = null;
function initSearch(){
  const input = document.getElementById('place-search-input');
  input.addEventListener('input', ()=>{
    clearTimeout(searchDebounce);
    const q = input.value.trim();
    if(q.length < 2){ document.getElementById('search-results').classList.add('hidden'); return; }
    searchDebounce = setTimeout(()=> doSearch(q), 500);
  });
}

async function doSearch(q){
  const resultsBox = document.getElementById('search-results');
  resultsBox.classList.remove('hidden');
  resultsBox.innerHTML = '<div class="sr-item">搜尋中...</div>';
  try{
    const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&q=${encodeURIComponent(q)}`;
    const res = await fetch(url);
    const data = await res.json();
    if(!data.length){
      resultsBox.innerHTML = '<div class="sr-item">找不到結果,可以改用手動新增</div>';
      return;
    }
    resultsBox.innerHTML = '';
    data.forEach(d=>{
      const div = document.createElement('div');
      div.className = 'sr-item';
      div.innerHTML = `<div class="sr-name">${escapeHtml(d.display_name.split(',')[0])}</div>
        <div class="sr-addr">${escapeHtml(d.display_name)}</div>`;
      div.onclick = ()=> addPlaceFromSearch(d);
      resultsBox.appendChild(div);
    });
  }catch(e){
    resultsBox.innerHTML = '<div class="sr-item">搜尋失敗,請改用手動新增</div>';
  }
}

async function addPlaceFromSearch(d){
  const place = {
    id: genId(),
    name: d.display_name.split(',')[0],
    address: d.display_name,
    lat: parseFloat(d.lat),
    lng: parseFloat(d.lon),
    addedBy: state.nickname
  };
  await addPlace(place);
  document.getElementById('place-search-input').value = '';
  document.getElementById('search-results').classList.add('hidden');
}

async function addPlace(place){
  state.places.push(place);
  await sSet(`group:${state.groupCode}:places`, JSON.stringify(state.places));
  renderPlaceList();
  refreshMarkers();
  toast(`已新增「${place.name}」`);
  openDetail(place.id);
}

// ---------- manual add ----------
function initManualAdd(){
  document.getElementById('manual-add-btn').onclick = () => {
    document.getElementById('manual-name').value = '';
    document.getElementById('manual-address').value = '';
    document.getElementById('manual-pick-status').textContent = '';
    state.manualPickedLatLng = null;
    document.getElementById('manual-overlay').classList.add('show');
    document.getElementById('manual-drawer').classList.add('open');
  };
  document.getElementById('manual-close').onclick = closeManual;
  document.getElementById('manual-overlay').onclick = closeManual;
  document.getElementById('manual-pick-map-btn').onclick = ()=>{
    state.manualPickMode = true;
    document.getElementById('manual-pick-status').textContent = '請到地圖上點擊一個位置...';
    closeManual(true);
  };
  document.getElementById('manual-save-btn').onclick = async ()=>{
    const name = document.getElementById('manual-name').value.trim();
    const address = document.getElementById('manual-address').value.trim();
    if(!name){ toast('請輸入店家名稱'); return; }
    let lat=null, lng=null;
    if(state.manualPickedLatLng){
      lat = state.manualPickedLatLng.lat; lng = state.manualPickedLatLng.lng;
    }else if(address){
      try{
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(address)}`;
        const res = await fetch(url);
        const data = await res.json();
        if(data.length){ lat=parseFloat(data[0].lat); lng=parseFloat(data[0].lon); }
      }catch(e){}
    }
    if(lat===null && state.map){
      const c = state.map.getCenter();
      lat = c.lat; lng = c.lng;
    }
    await addPlace({id:genId(), name, address, lat, lng, addedBy: state.nickname});
    closeManual();
  };
}
function closeManual(keepPickMode){
  document.getElementById('manual-overlay').classList.remove('show');
  document.getElementById('manual-drawer').classList.remove('open');
  if(!keepPickMode) state.manualPickMode = false;
}

// ---------- review save ----------
function initReviewForm(){
  document.querySelectorAll('#my-star-input span').forEach(s=>{
    s.onclick = ()=> setStarInput(parseInt(s.dataset.v));
  });
  document.getElementById('my-photo-input').onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        const maxW = 500;
        const scale = Math.min(1, maxW/img.width);
        canvas.width = img.width*scale;
        canvas.height = img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
        window._pendingPhoto = dataUrl;
        const prev = document.getElementById('my-photo-preview');
        prev.src = dataUrl; prev.style.display='block';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  document.getElementById('save-review-btn').onclick = async ()=>{
    const placeId = state.activePlaceId;
    if(!placeId) return;
    const stars = parseInt(document.getElementById('my-star-input').dataset.value || '0');
    if(!stars){ toast('請至少給個星等評分'); return; }
    const text = document.getElementById('my-review-text').value.trim();
    const tags = Array.from(document.querySelectorAll('#tag-picker .chip-opt.on')).map(c=>c.dataset.tag);
    const photo = window._pendingPhoto || null;
    const privateNote = document.getElementById('my-private-note').value.trim();

    let revs = state.reviews[placeId] || [];
    revs = revs.filter(r=>r.user !== state.nickname);
    revs.push({user: state.nickname, stars, text, tags, photo, date: Date.now(), dateStr: todayStr()});
    state.reviews[placeId] = revs;
    await sSet(`group:${state.groupCode}:reviews`, JSON.stringify(state.reviews));
    await sSet(`me:note:${state.groupCode}:${placeId}`, JSON.stringify({text: privateNote}));

    renderPlaceList();
    refreshMarkers();
    await renderDetail(placeId);
    toast('已儲存你的評價與備註');
  };

  document.getElementById('detail-close').onclick = closeDetail;
  document.getElementById('detail-overlay').onclick = closeDetail;
}
function closeDetail(){
  document.getElementById('detail-overlay').classList.remove('show');
  document.getElementById('detail-drawer').classList.remove('open');
  state.activePlaceId = null;
  renderPlaceList();
}

// ---------- topbar ----------
function initTopbar(){
  document.getElementById('refresh-btn').onclick = async ()=>{ await loadGroupData(); toast('已更新最新資料'); };
  document.getElementById('copy-code-btn').onclick = ()=>{
    navigator.clipboard.writeText(state.groupCode).then(()=> toast('已複製群組代碼:' + state.groupCode));
  };
  document.getElementById('leave-group-btn').onclick = ()=>{
    clearInterval(state.refreshTimer);
    document.getElementById('screen-app').style.display = 'none';
    document.getElementById('screen-onboarding').style.display = 'flex';
    document.getElementById('onboard-err').style.display = 'none';
    initOnboarding();
  };
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ---------- boot ----------
initOnboarding();
initSearch();
initManualAdd();
initReviewForm();
initTopbar();

})();
</script>
</body>
</html>
